<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다크넷</title>

<style>
/* 전체 초기화 */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

/* 배경 레이어 */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000 url('background/background_0.png') center / cover no-repeat;
    z-index: -1;
}

/* 스크롤 영역 */
.scroll-layer {
    min-height: 200vh; /* ⭐ 스크롤 생기게 하는 핵심 */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 중앙 텍스트 */
.center-content {
    text-align: center;
    color: white;
    font-family: 'Malgun Gothic', sans-serif;
    text-shadow: 0 0 15px rgba(0,0,0,0.8);
}

h1 {
    font-size: 4rem;
    letter-spacing: 8px;
    margin-bottom: 10px;
}

p {
    font-size: 1.5rem;
    letter-spacing: 3px;
    opacity: 0.8;
}
</style>
</head>

<body>
    <div class="background"></div>

    <div class="scroll-layer">
        <div class="center-content">
            <h1>다크넷</h1>
            <p>출시 예정</p>
        </div>
    </div>
</body>
</html>
